<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etiquetas (Ajuste Jeringa 5cc)</title>
    <style>
        /* ESTILOS GENERALES */
        :root { --primary: #2c3e50; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        /* --- PANEL DE CONTROL (NO SE IMPRIME) --- */
        .panel {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
            margin-bottom: 20px;
            border-top: 5px solid #0056b3;
        }
        .fila-input { margin-bottom: 10px; }
        label { font-weight: bold; font-size: 14px; display: block; margin-bottom: 5px; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        
        .botones { display: flex; gap: 10px; margin-top: 15px; }
        button { flex: 1; padding: 10px; border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; }
        .btn-add { background: #28a745; }
        .btn-cls { background: #dc3545; }
        .btn-prt { background: #007bff; }

        /* --- HOJA DE IMPRESIÓN --- */
        #hoja {
            background: white;
            width: auto; 
            min-height: 20cm;
            padding: 0.5cm;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 3mm; /* Espacio para meter tijera */
        }

        /* --- DISEÑO ANTI-CORTES (JERINGA 5CC) --- */
        .etiqueta {
            width: 4cm;
            min-height: 2cm; /* LA CLAVE: NUNCA ocultará datos */
            border: 1.5px solid #000;
            border-radius: 4px;
            background: white;
            box-sizing: border-box;
            padding: 2px 4px;
            
            font-family: 'Arial Narrow', Arial, sans-serif;
            color: #000;
            
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 1.5px;
            page-break-inside: avoid;
        }

        .nombre {
            font-weight: 900;
            font-size: 8.5pt;
            text-align: center;
            text-transform: uppercase;
            border-bottom: 1px solid #000;
            padding-bottom: 1px;
            line-height: 1.1;
        }

        .dosis {
            font-size: 6pt;
            font-weight: bold;
            text-align: center;
            line-height: 1;
        }

        .fechas {
            display: flex;
            flex-direction: column;
            gap: 1.5px;
            margin: 1.5px 0;
        }

        .fila-fecha {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 6.5pt;
            line-height: 1.1;
        }

        .txt-abierto { font-weight: bold; }
        
        .box-caducidad {
            background-color: #ffe6e6; 
            color: #d32f2f;            
            padding: 0 2px;
            border-radius: 2px;
            font-weight: bold;
        }

        .lab {
            font-weight: 900;
            font-size: 7.5pt; /* LABORATORIO GRANDE */
            text-align: center;
            text-transform: uppercase;
            border-top: 1px dotted #999;
            padding-top: 2px;
            line-height: 1;
        }

        .alertas {
            font-size: 5pt;
            font-weight: bold;
            display: flex;
            justify-content: center;
            gap: 10px;
            line-height: 1;
        }

        @media print {
            body { background: white; margin: 0; padding: 0; }
            .panel { display: none; }
            #hoja { width: 100%; margin: 0; padding: 0.5cm; box-shadow: none; }
            .etiqueta { border: 1.5px solid #000 !important; -webkit-print-color-adjust: exact; }
        }
    </style>
</head>
<body>

    <div class="panel">
        <h2 style="margin-top:0;">💉 Etiquetas Exactas (5cc)</h2>
        
        <div class="fila-input">
            <label>Medicamento:</label>
            <input list="listado" id="inp-med" placeholder="Escribe y presiona Enter..." autofocus>
            <datalist id="listado"></datalist>
        </div>

        <div class="fila-input">
            <label>Laboratorio (Opcional):</label>
            <input type="text" id="inp-lab" placeholder="Ej. FARMADEXTRUM">
        </div>

        <div class="botones">
            <button class="btn-add" onclick="agregar()">+ AGREGAR (Enter)</button>
            <button class="btn-cls" onclick="limpiar()">X BORRAR TODO</button>
            <button class="btn-prt" onclick="window.print()">IMPRIMIR</button>
        </div>
    </div>

    <div id="hoja"></div>

    <script src="datos.js"></script>

    <script>
        // Cargar los medicamentos desde datos.js
        window.onload = function() {
            const dl = document.getElementById("listado");
            if(typeof meds !== 'undefined') {
                meds.forEach(m => {
                    const op = document.createElement("option");
                    op.value = m.n;
                    dl.appendChild(op);
                });
            } else {
                alert("⚠️ Error: No se pudo cargar datos.js. Asegúrate de haberlo creado correctamente en GitHub.");
            }
        };

        document.getElementById("inp-med").addEventListener("keydown", function(event) {
            if (event.key === "Enter") { event.preventDefault(); agregar(); }
        });
        document.getElementById("inp-lab").addEventListener("keydown", function(event) {
            if (event.key === "Enter") { event.preventDefault(); agregar(); }
        });

        function fmt(f) {
            const d = String(f.getDate()).padStart(2,'0');
            const m = String(f.getMonth()+1).padStart(2,'0');
            const a = f.getFullYear();
            return `${d}/${m}/${a}`;
        }

        function limpiar() { document.getElementById("hoja").innerHTML = ""; }

        function agregar() {
            const inpMed = document.getElementById("inp-med");
            const nom = inpMed.value;
            const lab = document.getElementById("inp-lab").value;
            const med = meds.find(m => m.n === nom);

            if(!med) { alert("⚠️ Elige un medicamento válido de la lista."); return; }

            const hoy = new Date();
            const cad = new Date(hoy.getTime() + (med.d * 86400000));

            let luz = med.l === "SI" ? "<span>🚫 FOTOSENSIBLE</span>" : "";
            let temp = med.t.includes("REFRI") ? "<span>❄️ REFRI</span>" : "<span>TEMP. AMBIENTE</span>";

            let nombreLimpio = med.n.replace(/\s\d+.*$/, '').trim();

            const div = document.createElement("div");
            div.className = "etiqueta";
            div.innerHTML = `
                <div class="nombre">${nombreLimpio}</div>
                <div class="dosis">📦 ${med.p}</div>
                
                <div class="fechas">
                    <div class="fila-fecha">
                        <span class="txt-abierto">ABIERTO:</span>
                        <span>${fmt(hoy)}</span>
                    </div>
                    <div class="fila-fecha box-caducidad">
                        <span>CADUCIDAD:</span>
                        <span>${fmt(cad)}</span>
                    </div>
                </div>

                ${lab ? `<div class="lab">🏭 ${lab.toUpperCase()}</div>` : ''}
                
                <div class="alertas">${temp}${luz}</div>
            `;
            document.getElementById("hoja").appendChild(div);

            inpMed.value = ""; 
            inpMed.focus();    
        }
    </script>
</body>
</html>
